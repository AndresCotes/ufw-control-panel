<div class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md rounded-2xl border border-slate-200 bg-white/90 shadow-xl backdrop-blur p-8">
    <h1 class="text-2xl font-bold text-slate-900">UFW Control Panel</h1>
    <p class="text-sm text-slate-600 mt-1">Inicia sesión para administrar el firewall.</p>

    <form class="mt-6 space-y-4" (ngSubmit)="submit()">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input class="w-full rounded-lg border border-slate-300 px-3 py-2" name="email" [(ngModel)]="email" type="email" required />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input class="w-full rounded-lg border border-slate-300 px-3 py-2" name="password" [(ngModel)]="password" type="password" required />
      </div>

      @if (error) {
      <p class="text-sm text-rose-600">{{ error }}</p>
      }

      <button class="w-full rounded-lg bg-slate-900 text-white py-2.5 font-semibold hover:bg-slate-800" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>
