<div class="panel-card rounded-xl p-4">
  <h2 class="text-lg font-bold text-white">Auditoría</h2>
  @if (error) { <p class="text-sm text-rose-300 mt-2">{{error}}</p> }
  <div class="mt-3 space-y-2">
    @for (log of logs; track log.id) {
      <div class="text-sm text-blue-100 border-b border-blue-800 pb-2">{{log.created_at}} · {{log.module}} · {{log.action}} · {{log.success ? 'ok' : 'error'}} · {{log.command_executed || '-'}}</div>
    }
  </div>
</div>
