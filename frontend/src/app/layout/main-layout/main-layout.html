<div class="min-h-screen grid grid-cols-1 lg:grid-cols-[280px_1fr]" style="background:#0f1f3b;">
  <aside class="p-5 text-white border-r" style="background:#1a2f53;border-color:#315488;">
    <h2 class="text-xl font-extrabold tracking-tight">UFW Control Panel</h2>
    <p class="text-xs mt-1" style="color:#91b0df;">Firewall visual y seguro</p>

    <nav class="mt-8 space-y-2 text-sm">
      <a routerLink="/dashboard" routerLinkActive="bg-blue-700/40" class="block rounded-lg px-3 py-2 hover:bg-blue-700/30 transition">Dashboard</a>
      <a routerLink="/firewall/rules" routerLinkActive="bg-blue-700/40" class="block rounded-lg px-3 py-2 hover:bg-blue-700/30 transition">Reglas</a>
      <a routerLink="/zones" routerLinkActive="bg-blue-700/40" class="block rounded-lg px-3 py-2 hover:bg-blue-700/30 transition">Zonas</a>
      <a routerLink="/audit" routerLinkActive="bg-blue-700/40" class="block rounded-lg px-3 py-2 hover:bg-blue-700/30 transition">Auditoría</a>
      <a routerLink="/users" routerLinkActive="bg-blue-700/40" class="block rounded-lg px-3 py-2 hover:bg-blue-700/30 transition">Usuarios</a>
    </nav>
  </aside>

  <main>
    <header class="h-16 border-b flex items-center justify-between px-6 sticky top-0" style="background:#1a2f53;border-color:#315488;">
      <h1 class="text-base font-bold" style="color:#f3f8ff;">Panel de administración UFW</h1>
      <button (click)="auth.logout()" class="rounded-lg btn-brand px-3 py-1.5 text-sm font-semibold">Salir</button>
    </header>
    <section class="p-6">
      <router-outlet />
    </section>
  </main>
</div>
